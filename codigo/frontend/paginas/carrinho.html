<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Capítulo inicial</title>
    <link rel="stylesheet" href="..\css\style.css">
</head>

<body>
    <header> <!-- Cabeçalho -->
        <h2 class="logo">TTRAIO Web</h2> <!-- Logo do site -->
        <nav class="navigation">
            <a href="index.html">Inicio</a>
            <a href="sobre.html">Sobre</a>
            <a href="produto.html">Produtos</a>
            <a href="contatos.html">Contatos</a>
            <a href="carrinho.html" class="btnCarrinho">
                <ion-icon name="cart-outline"></ion-icon>
                <span id="qtdCarrinho">0</span>
            </a>
            <button class="btnLogin">Login</button>
        </nav>

        <div class="usuarioLogado" style="display: none;">
            <ion-icon name="person-circle-outline" class="iconeUsuario"></ion-icon>
            <span id="nomeUsuario"></span>
            <button class="btnUsuario" onclick="logout()">Sair</button>
        </div>
    </header>

    <div class="sobressair">
        <!-- X do site -->
        <span class="fechar"><ion-icon name="close"></ion-icon></span>
        <!-- Formulário de Login -->
        <div class="formsLogin">
            <h2>Login</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icone"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>

                <div class="input-box">
                    <span class="icone"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <!-- Botão de esqueci senha -->
                <div class="esqueciSenha">
                    <label><input type="checkbox">Remember me</label>
                    <a href="#" class="alterar">Forgot Password</a>
                </div>

                <!-- Botão de Logar -->
                <button type="submit" class="btn">Login</button> 
                <!-- Botão de Registrar -->
                <div class="loginRegister">
                    <p>Não há conta? <a href="#" class="registrar">Register</a></p>
                </div>
            </form>
        </div>

        <!-- Formulário de Registro -->
        <div class="formsRegister"> 
            <h2>Registrar-se</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icone"><ion-icon name="person"></ion-icon></span>
                    <input type="text" required>
                    <label>Username</label>
                </div>
                <div class="input-box">
                    <span class="icone"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>

                <div class="input-box">
                    <span class="icone"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>

                <div class="termosCondicoes">
                    <label><input type="checkbox">I agree to the terms & conditions</label>
                </div>
                <button type="submit" class="btn">Registrar-se</button> <!-- Botão de Registrar-se -->

                <div class="loginTela">
                    <p>Já possui uma conta?<a href="#" class="telaLogin"> Login</a></p>
                </div>
            </form>
        </div>

        <!-- Formulário de Verificação de Senha -->
        <div class="formsAlteracao"> 
            <h2>Verificar Dados</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icone"><ion-icon name="person"></ion-icon></span>
                    <input type="text" required>
                    <label>Qual é o seu Username?</label>
                </div>
                <div class="input-box">
                    <span class="icone"><ion-icon name="mail"></ion-icon></span>
                    <!-- Adicione um ID ao input de email -->
                    <input type="email" id="loginEmail" required>

                    <label>Qual é o seu E-mail?</label>
                </div>

                <button type="submit" class="btn">Verificar Senha</button> <!-- Botão de Verificar Senha -->

                <!-- ✅ Área da mensagem -->
                <div class="mensagem-recuperacao" style="display:none;"></div>

                <div class="loginTela">
                    <p>Encontrou sua conta?<a href="#" class="telaLogin"> Login</a></p>
                </div>
                <div class="loginRegister">
                    <p>Não encontrou sua conta? <a href="#" class="registrar">Register</a></p>
                </div>
            </form>
        </div>
    </div>

    <main>
        <h1 style="text-align:center; color: rgb(255, 255, 255); margin-bottom: 20px;">CARRINHO</h1>

        <div class="carrinho-container" id="carrinhoContainer"></div>

        <button class="btnContinuar" id="btnContinuar">Continuar Comprando</button>
        <p class="total" id="valorTotal">Total: R$ 0,00</p>
        <button class="btnFinalizar" id="btnFinalizar">Finalizar Compra</button>
    </main>

    <script>
        const carrinhoContainer = document.getElementById('carrinhoContainer');
        let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

        function atualizarCarrinho() {
            carrinhoContainer.innerHTML = '';
            let total = 0;

            if (carrinho.length === 0) {
                carrinhoContainer.innerHTML = '<p style="text-align:center;">Seu carrinho está vazio.</p>';
            } else {
                carrinho.forEach((item, index) => {
                    total += item.preco * item.quantidade;

                    const div = document.createElement('div');
                    div.classList.add('carrinho-item');
                    div.innerHTML = `
                    <img src="${item.imagem}" alt="${item.nome}">
                    <div class="item-info">
                        <p><strong>${item.nome}</strong></p>
                        <p>R$ ${item.preco.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</p>
                        <div class="quantidade">
                            <button class="btnMenos">-</button>
                            <span>${item.quantidade}</span>
                            <button class="btnMais">+</button>
                        </div>
                    </div>
                    <button class="btnRemover">Remover</button>
                `;
                    carrinhoContainer.appendChild(div);

                    // Remover produto
                    div.querySelector('.btnRemover').addEventListener('click', () => {
                        carrinho.splice(index, 1);
                        localStorage.setItem('carrinho', JSON.stringify(carrinho));
                        atualizarCarrinho();
                        atualizarQtdCarrinho(); //  atualiza número do cabeçalho
                    });

                    // Aumentar quantidade
                    div.querySelector('.btnMais').addEventListener('click', () => {
                        item.quantidade += 1;
                        localStorage.setItem('carrinho', JSON.stringify(carrinho));
                        atualizarCarrinho();
                        atualizarQtdCarrinho(); //  atualiza número do cabeçalho
                    });

                    // Diminuir quantidade
                    div.querySelector('.btnMenos').addEventListener('click', () => {
                        if (item.quantidade > 1) {
                            item.quantidade -= 1;
                        } else {
                            carrinho.splice(index, 1);
                        }
                        localStorage.setItem('carrinho', JSON.stringify(carrinho));
                        atualizarCarrinho();
                        atualizarQtdCarrinho(); //  atualiza número do cabeçalho
                    });
                });
            }
            document.getElementById('valorTotal').innerText = 'Total: R$ ' + total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        atualizarCarrinho();

        // Continuar comprando
        document.getElementById('btnContinuar').addEventListener('click', () => {
            window.location.href = 'produto.html';
        });

        // Finalizar compra
        document.getElementById('btnFinalizar').addEventListener('click', () => {
            if (carrinho.length === 0) {
                alert('Seu carrinho está vazio!');
            } else {
                window.location.href = 'checkout.html';
            }
        });
    </script>

    <script src="../js/script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
